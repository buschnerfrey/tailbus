syntax = "proto3";

package tailbus.v1;

option go_package = "github.com/alexanderfrey/tailbus/api/messagepb";

enum EnvelopeType {
  ENVELOPE_TYPE_UNSPECIFIED = 0;
  ENVELOPE_TYPE_MESSAGE = 1;
  ENVELOPE_TYPE_SESSION_OPEN = 2;
  ENVELOPE_TYPE_SESSION_RESOLVE = 3;
  ENVELOPE_TYPE_ACK = 4;
}

message Envelope {
  string message_id = 1;
  string session_id = 2;
  string from_handle = 3;
  string to_handle = 4;
  bytes payload = 5;
  string content_type = 6;
  int64 sent_at_unix = 7;
  EnvelopeType type = 8;
  string trace_id = 9;
  uint64 sequence = 10;
  string ack_id = 11;
  bytes relay_target_key = 12;  // Target node pubkey (set by sender when routing via relay)
}

message CommandSpec {
  string name = 1;
  string description = 2;
  string parameters_schema = 3; // optional JSON Schema
}

message ServiceManifest {
  string description = 1;
  repeated CommandSpec commands = 2;
  repeated string tags = 3;
  string version = 4;
}
