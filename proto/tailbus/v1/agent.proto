syntax = "proto3";

package tailbus.v1;

option go_package = "github.com/alexanderfrey/tailbus/api/agentpb";

import "tailbus/v1/messages.proto";
import "google/protobuf/timestamp.proto";

service AgentAPI {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc IntrospectHandle(IntrospectHandleRequest) returns (IntrospectHandleResponse);
  rpc ListHandles(ListHandlesRequest) returns (ListHandlesResponse);
  rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc Subscribe(SubscribeRequest) returns (stream IncomingMessage);
  rpc ResolveSession(ResolveSessionRequest) returns (ResolveSessionResponse);
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse);
  rpc JoinRoom(JoinRoomRequest) returns (JoinRoomResponse);
  rpc LeaveRoom(LeaveRoomRequest) returns (LeaveRoomResponse);
  rpc PostRoomMessage(PostRoomMessageRequest) returns (PostRoomMessageResponse);
  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse);
  rpc ListRoomMembers(ListRoomMembersRequest) returns (ListRoomMembersResponse);
  rpc ReplayRoom(ReplayRoomRequest) returns (ReplayRoomResponse);
  rpc CloseRoom(CloseRoomRequest) returns (CloseRoomResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetNodeStatus(GetNodeStatusRequest) returns (GetNodeStatusResponse);
  rpc WatchActivity(WatchActivityRequest) returns (stream ActivityEvent);
  rpc GetTrace(GetTraceRequest) returns (GetTraceResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

message RegisterRequest {
  string handle = 1;
  string description = 2 [deprecated = true];
  ServiceManifest manifest = 3;
}

message RegisterResponse {
  bool ok = 1;
  string error = 2;
}

message IntrospectHandleRequest {
  string handle = 1;
}

message IntrospectHandleResponse {
  string handle = 1;
  string description = 2 [deprecated = true];
  bool found = 3;
  ServiceManifest manifest = 4;
}

message ListHandlesRequest {
  repeated string tags = 1;
}

message ListHandlesResponse {
  repeated HandleEntry entries = 1;
}

message HandleEntry {
  string handle = 1;
  ServiceManifest manifest = 2;
}

message OpenSessionRequest {
  string from_handle = 1;
  string to_handle = 2;
  bytes payload = 3;
  string content_type = 4;
  string trace_id = 5;
}

message OpenSessionResponse {
  string session_id = 1;
  string message_id = 2;
  string trace_id = 3;
}

message SendMessageRequest {
  string session_id = 1;
  string from_handle = 2;
  bytes payload = 3;
  string content_type = 4;
}

message SendMessageResponse {
  string message_id = 1;
}

message SubscribeRequest {
  string handle = 1;
}

message IncomingMessage {
  Envelope envelope = 1;
  RoomEvent room_event = 2;
}

message ResolveSessionRequest {
  string session_id = 1;
  string from_handle = 2;
  bytes payload = 3;
  string content_type = 4;
}

message ResolveSessionResponse {
  string message_id = 1;
}

message CreateRoomRequest {
  string creator_handle = 1;
  string title = 2;
  repeated string initial_members = 3;
}

message CreateRoomResponse {
  string room_id = 1;
}

message JoinRoomRequest {
  string room_id = 1;
  string handle = 2;
}

message JoinRoomResponse {
  bool ok = 1;
}

message LeaveRoomRequest {
  string room_id = 1;
  string handle = 2;
}

message LeaveRoomResponse {
  bool ok = 1;
}

message PostRoomMessageRequest {
  string room_id = 1;
  string from_handle = 2;
  bytes payload = 3;
  string content_type = 4;
  string trace_id = 5;
}

message PostRoomMessageResponse {
  string event_id = 1;
  uint64 room_seq = 2;
}

message ListRoomsRequest {
  string handle = 1;
}

message ListRoomsResponse {
  repeated RoomInfo rooms = 1;
}

message ListRoomMembersRequest {
  string room_id = 1;
  string handle = 2;
}

message ListRoomMembersResponse {
  repeated string members = 1;
}

message ReplayRoomRequest {
  string room_id = 1;
  string handle = 2;
  uint64 since_seq = 3;
}

message ReplayRoomResponse {
  repeated RoomEvent events = 1;
}

message CloseRoomRequest {
  string room_id = 1;
  string handle = 2;
}

message CloseRoomResponse {
  bool ok = 1;
}

message ListSessionsRequest {
  string handle = 1;
}

message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

message SessionInfo {
  string session_id = 1;
  string from_handle = 2;
  string to_handle = 3;
  string state = 4;
  int64 created_at_unix = 5;
  int64 updated_at_unix = 6;
}

// --- Dashboard RPCs ---

message GetNodeStatusRequest {}

message GetNodeStatusResponse {
  string node_id = 1;
  google.protobuf.Timestamp started_at = 2;
  repeated HandleInfo handles = 3;
  repeated PeerStatus peers = 4;
  repeated SessionInfo sessions = 5;
  Counters counters = 6;
  repeated RelayStatus relays = 7;
  repeated RoomInfo rooms = 8;
}

message RelayStatus {
  string node_id = 1;
  string addr = 2;
  bool connected = 3;
}

message HandleInfo {
  string name = 1;
  int32 subscriber_count = 2;
  string description = 3 [deprecated = true];
  ServiceManifest manifest = 4;
  int64 messages_in = 5;
  int64 messages_out = 6;
  int64 drops = 7;
  int32 queue_depth = 8;
}

message PeerStatus {
  string node_id = 1;
  string advertise_addr = 2;
  repeated string handles = 3;
  bool connected = 4;
  string connectivity = 5; // "direct", "relay", or "offline"
}

message Counters {
  int64 messages_routed = 1;
  int64 messages_delivered_local = 2;
  int64 messages_sent_remote = 3;
  int64 messages_received_remote = 4;
  int64 sessions_opened = 5;
  int64 sessions_resolved = 6;
  int64 rooms_created = 7;
  int64 room_messages_posted = 8;
  int64 room_members_joined = 9;
  int64 room_members_left = 10;
  int64 rooms_closed = 11;
}

message WatchActivityRequest {}

message ActivityEvent {
  google.protobuf.Timestamp timestamp = 1;
  oneof event {
    MessageRoutedEvent message_routed = 2;
    SessionOpenedEvent session_opened = 3;
    SessionResolvedEvent session_resolved = 4;
    HandleRegisteredEvent handle_registered = 5;
    RoomCreatedEvent room_created = 6;
    RoomMessagePostedEvent room_message_posted = 7;
    RoomMemberJoinedEvent room_member_joined = 8;
    RoomMemberLeftEvent room_member_left = 9;
    RoomClosedEvent room_closed = 10;
  }
}

message MessageRoutedEvent {
  string session_id = 1;
  string from_handle = 2;
  string to_handle = 3;
  bool remote = 4;
  string trace_id = 5;
  string message_id = 6;
}

message SessionOpenedEvent {
  string session_id = 1;
  string from_handle = 2;
  string to_handle = 3;
}

message SessionResolvedEvent {
  string session_id = 1;
  string from_handle = 2;
}

message HandleRegisteredEvent {
  string handle = 1;
}

message RoomCreatedEvent {
  string room_id = 1;
  string title = 2;
  string created_by = 3;
  repeated string member_handles = 4;
}

message RoomMessagePostedEvent {
  string room_id = 1;
  uint64 room_seq = 2;
  string from_handle = 3;
  repeated string member_handles = 4;
  string trace_id = 5;
  string content_type = 6;
  string content_kind = 7;
  string target_handle = 8;
  string turn_id = 9;
  string status = 10;
  uint32 round = 11;
}

message RoomMemberJoinedEvent {
  string room_id = 1;
  string handle = 2;
  repeated string member_handles = 3;
}

message RoomMemberLeftEvent {
  string room_id = 1;
  string handle = 2;
  repeated string member_handles = 3;
}

message RoomClosedEvent {
  string room_id = 1;
  string closed_by = 2;
  repeated string member_handles = 3;
}

// --- Tracing ---

enum TraceAction {
  TRACE_ACTION_UNSPECIFIED = 0;
  TRACE_ACTION_MESSAGE_CREATED = 1;
  TRACE_ACTION_ROUTED_LOCAL = 2;
  TRACE_ACTION_ROUTED_REMOTE = 3;
  TRACE_ACTION_SENT_TO_TRANSPORT = 4;
  TRACE_ACTION_RECEIVED_FROM_TRANSPORT = 5;
  TRACE_ACTION_DELIVERED_TO_SUBSCRIBER = 6;
}

message TraceSpan {
  string trace_id = 1;
  string message_id = 2;
  string node_id = 3;
  TraceAction action = 4;
  google.protobuf.Timestamp timestamp = 5;
  map<string, string> metadata = 6;
}

message GetTraceRequest {
  string trace_id = 1;
}

message GetTraceResponse {
  repeated TraceSpan spans = 1;
}

// --- Shutdown ---

message ShutdownRequest {}

message ShutdownResponse {}
