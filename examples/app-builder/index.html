<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Todo</h1>
    <form id="todo-form" class="input-row">
      <input type="text" id="todo-input" placeholder="Add a task..." autocomplete="off" required>
      <button type="submit">Add</button>
    </form>
    <ul id="todo-list" class="todo-list"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
