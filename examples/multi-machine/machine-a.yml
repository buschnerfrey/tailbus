# Machine A — primary node: coord + relay + daemon + web UI + agents
#
# This machine runs the coordination server that all other machines connect to.
# It also runs a relay server for NAT traversal.
#
# Usage:
#   export HOST_IP=<this machine's LAN/public IP>
#   docker compose -f machine-a.yml up --build
#
# Then on Machine B:
#   export COORD_IP=<Machine A's IP>
#   docker compose -f machine-b.yml up --build
#
# Web UI: http://<HOST_IP>:8080
# Coord:  <HOST_IP>:8443 (other machines connect here)
# Relay:  <HOST_IP>:7443 (NAT traversal fallback)

services:
  coord:
    build:
      context: ../..
      target: coord
    ports:
      - "8443:8443"
    volumes:
      - coord-data:/data
    command: ["-data-dir", "/data", "-listen", ":8443", "-health-addr", ":8081"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10

  relay:
    build:
      context: ../..
      target: relay
    ports:
      - "7443:7443"
    depends_on:
      coord:
        condition: service_healthy
    command:
      - -relay-id
      - relay-a
      - -coord
      - coord:8443
      - -listen
      - ":7443"
      - -health-addr
      - ":8082"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10

  daemon:
    build:
      context: ../..
      target: daemon
    ports:
      - "8080:8080"
      - "9090:9090"
      - "9443:9443"
    volumes:
      - daemon-data:/data
      - daemon-sock:/var/run/tailbus
      - ../../sdk:/sdk:ro
      - .:/agents:ro
    depends_on:
      coord:
        condition: service_healthy
    command:
      - -node-id
      - machine-a
      - -coord
      - coord:8443
      - -advertise
      - ${HOST_IP:-localhost}:9443
      - -listen
      - ":9443"
      - -socket
      - /var/run/tailbus/tailbusd.sock
      - -metrics
      - ":9090"
      - -mcp
      - ":8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/readyz"]
      interval: 3s
      timeout: 2s
      retries: 10

  # LLM-powered agents (use LM Studio on this machine)
  researcher:
    build:
      context: ../..
      target: daemon
    volumes:
      - daemon-sock:/var/run/tailbus
      - ../../sdk:/sdk:ro
      - .:/agents:ro
    depends_on:
      daemon:
        condition: service_healthy
    entrypoint: ["python3", "/agents/researcher_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: on-failure

  critic:
    build:
      context: ../..
      target: daemon
    volumes:
      - daemon-sock:/var/run/tailbus
      - ../../sdk:/sdk:ro
      - .:/agents:ro
    depends_on:
      daemon:
        condition: service_healthy
    entrypoint: ["python3", "/agents/critic_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: on-failure

volumes:
  coord-data:
  daemon-data:
  daemon-sock:
