# Tailbus Docker Compose — local mesh with MCP gateway + web UI
#
# Usage:
#   docker compose up --build
#
# This gives you:
#   - Coordination server (discovery + peer map)
#   - Two daemon nodes with P2P connectivity
#   - MCP gateway + web chat UI on daemon1 (http://localhost:8080)
#   - Four example Python agents (researcher, critic, writer, echo)
#
# Open http://localhost:8080 in your browser for the chat UI.
#
# Test with curl:
#   # List available tools (agents)
#   curl -s localhost:8080/mcp -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' | jq
#
#   # Call the echo agent
#   curl -s localhost:8080/mcp -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"echo","arguments":{"message":"hello world"}}}' | jq
#
#   # Ask the researcher to investigate a topic
#   curl -s localhost:8080/mcp -d '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"researcher","arguments":{"message":"Summarize Tailbus in 3 bullets."}}}' | jq

services:
  # --- Coordination server ---
  coord:
    build:
      context: .
      target: coord
    ports:
      - "8443:8443"
    volumes:
      - coord-data:/data
    command: ["-data-dir", "/data", "-listen", ":8443", "-health-addr", ":8081"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10

  # --- Daemon 1 (with MCP gateway + researcher + critic agents) ---
  daemon1:
    build:
      context: .
      target: daemon
    ports:
      - "8080:8080"    # MCP gateway + web UI
      - "9090:9090"    # Prometheus metrics
    volumes:
      - daemon1-data:/data
      - daemon1-sock:/var/run/tailbus
      - ./sdk:/sdk:ro
      - ./examples/multi-machine:/agents:ro
    depends_on:
      coord:
        condition: service_healthy
    command:
      - -node-id
      - daemon1
      - -coord
      - coord:8443
      - -advertise
      - daemon1:9443
      - -listen
      - ":9443"
      - -socket
      - /var/run/tailbus/tailbusd.sock
      - -metrics
      - ":9090"
      - -mcp
      - ":8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/readyz"]
      interval: 3s
      timeout: 2s
      retries: 10

  # Researcher agent on daemon1
  researcher:
    build:
      context: .
      target: daemon
    volumes:
      - daemon1-sock:/var/run/tailbus
      - ./sdk:/sdk:ro
      - ./examples/multi-machine:/agents:ro
    depends_on:
      daemon1:
        condition: service_healthy
    entrypoint: ["python3", "/agents/researcher_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: on-failure

  # Critic agent on daemon1
  critic:
    build:
      context: .
      target: daemon
    volumes:
      - daemon1-sock:/var/run/tailbus
      - ./sdk:/sdk:ro
      - ./examples/multi-machine:/agents:ro
    depends_on:
      daemon1:
        condition: service_healthy
    entrypoint: ["python3", "/agents/critic_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: on-failure

  # --- Daemon 2 (with writer + echo agents) ---
  daemon2:
    build:
      context: .
      target: daemon
    volumes:
      - daemon2-data:/data
      - daemon2-sock:/var/run/tailbus
      - ./sdk:/sdk:ro
      - ./examples/multi-machine:/agents:ro
    depends_on:
      coord:
        condition: service_healthy
    command:
      - -node-id
      - daemon2
      - -coord
      - coord:8443
      - -advertise
      - daemon2:9443
      - -listen
      - ":9443"
      - -socket
      - /var/run/tailbus/tailbusd.sock
      - -metrics
      - ":9091"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/readyz"]
      interval: 3s
      timeout: 2s
      retries: 10

  # Writer agent on daemon2
  writer:
    build:
      context: .
      target: daemon
    volumes:
      - daemon2-sock:/var/run/tailbus
      - ./sdk:/sdk:ro
      - ./examples/multi-machine:/agents:ro
    depends_on:
      daemon2:
        condition: service_healthy
    entrypoint: ["python3", "/agents/writer_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: on-failure

  # Echo agent on daemon2 (demonstrates cross-node messaging)
  echo:
    build:
      context: .
      target: daemon
    volumes:
      - daemon2-sock:/var/run/tailbus
      - ./sdk:/sdk:ro
      - ./examples/multi-machine:/agents:ro
    depends_on:
      daemon2:
        condition: service_healthy
    entrypoint: ["python3", "/agents/echo_agent.py"]
    environment:
      - TAILBUS_SOCKET=/var/run/tailbus/tailbusd.sock
    restart: on-failure

volumes:
  coord-data:
  daemon1-data:
  daemon1-sock:
  daemon2-data:
  daemon2-sock:
